<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catálogo · ARS Tecnología</title>
<meta property="og:title" content="Catálogo en vivo - ARS Tecnología">
<meta property="og:description" content="Lista de precios actualizada en tiempo real. Módulos, baterías y placas de carga. Martín Gainza 843, Alejandro Korn · 11 2186-1878">
<meta property="og:image" content="https://arstecnologia-ar.github.io/arstecnologia/logo.png">
<meta property="og:url" content="https://arstecnologia-ar.github.io/arstecnologia/catalogo.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Catálogo en vivo - ARS Tecnología">
<meta name="twitter:image" content="https://arstecnologia-ar.github.io/arstecnologia/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --azul:#0a3d62; --azul2:#13577f; --celeste:#1e6f9c; --cel-claro:#d6ecff;
    --borde:#2a7fb8; --acento:#ffd000; --txt:#0c2733;
  }
  body{background:var(--cel-claro);font-family:Inter,system-ui,sans-serif;color:var(--txt);padding-bottom:84px}
  .loading{position:fixed;inset:0;background:var(--azul);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.25);border-top-color:var(--acento);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .wrap{max-width:820px;margin:0 auto;background:#fff;min-height:100vh}

  /* Cabecera compacta: logo chico + contacto en una línea */
  .top{background:var(--azul);padding:12px 16px;display:flex;align-items:center;gap:12px}
  .top img{height:42px;width:auto;background:#fff;border-radius:9px;padding:6px}
  .top .brand{flex:1;min-width:0}
  .top .brand b{display:block;font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px}
  .top .brand span{font-size:10px;color:#9fcdec;letter-spacing:2px}
  .top a{display:flex;align-items:center;gap:5px;background:#1d9e75;color:#fff;text-decoration:none;font-size:12px;font-weight:700;padding:8px 11px;border-radius:9px;white-space:nowrap}

  /* Buscador protagonista */
  .searchbar{position:sticky;top:0;z-index:60;background:var(--azul);padding:0 12px 10px}
  .search{width:100%;background:#fff;border:none;border-radius:11px;padding:14px 16px;color:var(--txt);font-family:Inter;font-size:16px;font-weight:500;outline:none;box-shadow:0 2px 10px rgba(0,0,0,.18)}
  .search::placeholder{color:#7e94a0}
  .live{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-size:10px;font-weight:700;color:#9fcdec;letter-spacing:1.5px}
  .dot{width:7px;height:7px;border-radius:50%;background:#3ee07f;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Chips de categoría */
  .cats{position:sticky;top:64px;z-index:55;display:flex;gap:7px;padding:11px 12px;background:#fff;border-bottom:1px solid #e4eef6;overflow-x:auto}
  .chip{flex-shrink:0;background:#eef6fc;border:1.5px solid #d3e6f3;border-radius:999px;padding:8px 15px;color:#2b5468;font-size:12.5px;font-weight:700;cursor:pointer;transition:.12s;white-space:nowrap}
  .chip.on{background:var(--azul);border-color:var(--azul);color:#fff}

  /* Índice de marcas pegajoso (salto rápido) */
  .marca-idx{position:sticky;top:113px;z-index:50;display:flex;gap:6px;padding:9px 12px;background:#f5fafe;border-bottom:1px solid #e4eef6;overflow-x:auto}
  .marca-idx button{flex-shrink:0;background:#fff;border:1px solid #d3e6f3;border-radius:7px;padding:5px 11px;font-family:Roboto Mono,monospace;font-size:11px;font-weight:700;color:var(--celeste);cursor:pointer}
  .marca-idx button:active{background:var(--azul);color:#fff}

  .content{padding:4px 12px 0}

  /* Encabezado de marca */
  .marca-h{position:sticky;top:152px;z-index:40;display:flex;align-items:center;gap:9px;background:var(--azul);padding:9px 14px;margin:14px 0 0;border-radius:9px 9px 0 0;border-left:4px solid var(--acento)}
  .marca-h .mn{font-family:Roboto Mono,monospace;font-size:13px;font-weight:700;color:#fff;letter-spacing:2px}
  .marca-h .mc{margin-left:auto;font-size:10px;color:#9fcdec;font-weight:600}

  /* Filas express */
  .lista{border:1px solid #e4eef6;border-top:none;border-radius:0 0 9px 9px;overflow:hidden}
  .fila{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid #f0f5f9;cursor:pointer;transition:.1s}
  .fila:last-child{border-bottom:none}
  .fila:active{background:#eef6fc}
  .fila .nom{flex:1;min-width:0;font-family:Roboto Mono,monospace;font-size:13px;font-weight:500;line-height:1.3;word-break:break-word}
  .fila .precio{font-family:Roboto Mono,monospace;font-size:14px;font-weight:700;color:var(--azul);white-space:nowrap;font-variant-numeric:tabular-nums}
  .tag{display:inline-block;font-family:Inter;font-size:8px;font-weight:800;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
  .tag-of{background:var(--acento);color:#3a2e00}
  .tag-cm{background:#9a4d00;color:#fff}
  .fila.of{background:#fffbe6}
  .fila.cm{background:#fff1de}
  .fila.ag{opacity:.55;cursor:default}
  .fila.ag:active{background:none}
  .fila.incart{background:#e8f7ef}
  .qty{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;background:#1d9e75;color:#fff;font-size:11px;font-weight:800;border-radius:10px;padding:0 6px;margin-left:6px}
  .sinstock{color:#c0392b;font-size:12px;font-weight:700}

  .empty{text-align:center;padding:60px 20px;color:#5a7689;font-size:14px}
  .foot{text-align:center;padding:22px;color:#5a7689;font-size:11px;font-style:italic}

  /* Carrito */
  .cart-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:820px;background:#1d9e75;color:#fff;display:none;align-items:center;justify-content:space-between;padding:15px 20px;font-weight:700;cursor:pointer;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.25)}
  .cart-bar .cc{display:flex;align-items:center;gap:9px}
  .cart-bar .badge{background:#fff;color:#1d9e75;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12px}
  .cart-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:820px;background:#fff;z-index:210;border-radius:18px 18px 0 0;transition:transform .25s;max-height:78vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.3)}
  .cart-panel.open{transform:translateX(-50%) translateY(0)}
  .cart-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 12px;border-bottom:1px solid #eef2f5}
  .cart-head b{font-size:16px}
  .cart-vaciar{background:none;border:none;color:#c0392b;font-size:12px;font-weight:700;cursor:pointer}
  .cart-items{overflow-y:auto;padding:8px 16px}
  .cart-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f3f3f3}
  .ci-name{flex:1;font-size:13px;font-weight:600;line-height:1.3}
  .ci-sub{font-size:11px;color:#888;font-weight:400;margin-top:2px}
  .ci-qty{display:flex;align-items:center;gap:9px}
  .ci-qty button{width:28px;height:28px;border:1px solid #d3e6f3;background:#f5fafe;border-radius:7px;font-size:17px;font-weight:700;color:var(--azul);cursor:pointer}
  .ci-qty span{min-width:18px;text-align:center;font-weight:700;font-size:14px}
  .ci-sub-total{font-family:Roboto Mono,monospace;font-weight:700;font-size:13px;min-width:72px;text-align:right}
  .ci-del{background:none;border:none;color:#bbb;font-size:14px;cursor:pointer;padding:4px}
  .cart-foot{padding:16px 20px;border-top:1px solid #eef2f5;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .cart-foot-total{font-size:14px}
  .cart-foot-total strong{font-size:19px;color:var(--azul)}
  .cart-wsp{display:inline-flex;align-items:center;gap:8px;background:#1d9e75;color:#fff;border:none;border-radius:11px;padding:14px 20px;font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="color:var(--acento);font-size:12px;letter-spacing:2px;font-weight:700">CARGANDO CATÁLOGO…</div>
</div>

<div class="wrap">
  <div class="top">
    <img src="logo.png" alt="ARS Tecnología" onerror="this.style.display='none'">
    <div class="brand"><b>ARS Tecnología</b><span>LISTA EN VIVO</span></div>
    <a href="https://wa.me/5491121861878" target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2z"/></svg>
      Pedir
    </a>
  </div>
  <div class="searchbar">
    <input type="text" class="search" id="search" placeholder="🔍 Buscar modelo, marca o repuesto…">
    <div class="live"><span class="dot"></span>ACTUALIZADO EN TIEMPO REAL</div>
  </div>
  <div class="cats" id="cats">
    <div class="chip on" data-cat="todos" onclick="setCategoria('todos',this)">Todos</div>
    <div class="chip" data-cat="Módulo" onclick="setCategoria('Módulo',this)">Módulos</div>
    <div class="chip" data-cat="Batería" onclick="setCategoria('Batería',this)">Baterías</div>
    <div class="chip" data-cat="Placa de Carga" onclick="setCategoria('Placa de Carga',this)">Placas de carga</div>
  </div>
  <div class="marca-idx" id="marca-idx"></div>
  <div class="content" id="content"></div>
  <div class="foot">ARS Tecnología · Martín Gainza 843, Alejandro Korn · 11 2186-1878</div>
</div>

<div class="cart-panel" id="cart-panel">
  <div class="cart-head"><b>Tu pedido</b><button class="cart-vaciar" onclick="vaciarCarrito()">Vaciar</button></div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot">
    <div class="cart-foot-total">Total <strong id="panel-total">$ 0</strong></div>
    <button class="cart-wsp" onclick="enviarWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2z"/></svg>
      Enviar por WhatsApp
    </button>
  </div>
</div>
<div class="cart-bar" id="cart-bar" onclick="toggleCarrito()">
  <div class="cc"><span class="badge" id="cart-count">0</span><span>Ver pedido</span></div>
  <span id="cart-total">$ 0</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8YdOB_FVf6oSyFCWlzKepNSq46OEGU38",
  authDomain: "arstecnologia.firebaseapp.com",
  projectId: "arstecnologia",
  storageBucket: "arstecnologia.firebasestorage.app",
  messagingSenderId: "995023045742",
  appId: "1:995023045742:web:34dabb6d439e2f68add27f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var PRODUCTOS=[], filtro='', categoriaActiva='todos';
var cats=['Módulo','Batería','Placa de Carga'];
var ORDEN_FIJO={'samsung':1,'motorola':2,'iphone':3,'apple':3,'xiaomi':4,'tcl':5,'lg':6};
function getOrdenMarca(marca,productos){
  var m=marca.toLowerCase().trim();
  for(var key in ORDEN_FIJO){ if(m.indexOf(key)>=0) return ORDEN_FIJO[key]; }
  var ov=productos.map(function(p){return p.orden||0;}).filter(function(o){return o>0;});
  if(ov.length>0) return 100+Math.min.apply(null,ov);
  return 9999;
}
function fmt(n){ return '$ '+Number(n||0).toLocaleString('es-AR'); }
function slug(s){ return 'm_'+s.toLowerCase().replace(/[^a-z0-9]/g,''); }

var CART={}, WSP_NUMERO='5491121861878';
function cartId(p){ return (p.categoria||'')+'|'+(p.modelo||'')+'|'+(p.nombre||''); }
function addToCart(id){
  var p=PRODUCTOS.find(function(x){return cartId(x)===id;});
  if(!p||p.stock===0) return;
  if(CART[id]) CART[id].cant++;
  else CART[id]={nombre:p.nombre,precio:p.precio,cant:1};
  renderCarrito(); render();
}
window.cambiarCant=function(id,d){
  if(!CART[id]) return;
  CART[id].cant+=d;
  if(CART[id].cant<=0) delete CART[id];
  renderCarrito(); render();
};
window.quitarItem=function(id){ delete CART[id]; renderCarrito(); render(); };
window.vaciarCarrito=function(){ CART={}; renderCarrito(); render(); };
function totalCarrito(){ var t=0,n=0; for(var id in CART){ t+=CART[id].precio*CART[id].cant; n+=CART[id].cant; } return {total:t,unidades:n}; }
function renderCarrito(){
  var bar=document.getElementById('cart-bar'), panel=document.getElementById('cart-panel'), t=totalCarrito();
  if(t.unidades===0){ bar.style.display='none'; panel.classList.remove('open'); return; }
  bar.style.display='flex';
  document.getElementById('cart-count').textContent=t.unidades;
  document.getElementById('cart-total').textContent=fmt(t.total);
  var items='';
  for(var id in CART){ var it=CART[id]; var sid=id.replace(/'/g,"\\'");
    items+='<div class="cart-item"><div class="ci-name">'+it.nombre+'<div class="ci-sub">'+fmt(it.precio)+' c/u</div></div>'+
    '<div class="ci-qty"><button onclick="cambiarCant(\''+sid+'\',-1)">−</button><span>'+it.cant+'</span><button onclick="cambiarCant(\''+sid+'\',1)">+</button></div>'+
    '<div class="ci-sub-total">'+fmt(it.precio*it.cant)+'</div><button class="ci-del" onclick="quitarItem(\''+sid+'\')">✕</button></div>';
  }
  document.getElementById('cart-items').innerHTML=items;
  document.getElementById('panel-total').textContent=fmt(t.total);
}
window.toggleCarrito=function(){ document.getElementById('cart-panel').classList.toggle('open'); };
window.enviarWhatsApp=function(){
  var t=totalCarrito(); if(t.unidades===0) return;
  var msg='*PEDIDO - ARS Tecnología*\n\n';
  for(var id in CART){ var it=CART[id]; msg+='• '+it.cant+'x '+it.nombre+' — '+fmt(it.precio*it.cant)+'\n'; }
  msg+='\n*Total: '+fmt(t.total)+'* ('+t.unidades+' u.)\n\nHola! Quiero hacer este pedido.';
  window.open('https://wa.me/'+WSP_NUMERO+'?text='+encodeURIComponent(msg),'_blank');
};

function render(){
  var cont=document.getElementById('content'), f=filtro.toLowerCase().trim();
  var html='', hayAlgo=false, indiceMarcas=[];
  cats.forEach(function(cat){
    if(categoriaActiva!=='todos' && cat!==categoriaActiva) return;
    var prodsCat=PRODUCTOS.filter(function(p){
      if(p.categoria!==cat) return false;
      if(!f) return true;
      return (p.nombre||'').toLowerCase().indexOf(f)>=0 || (p.modelo||'').toLowerCase().indexOf(f)>=0;
    });
    if(prodsCat.length===0) return;
    hayAlgo=true;
    var grupos={};
    prodsCat.forEach(function(p){ var m=(p.modelo||'Sin marca').trim(); if(!grupos[m])grupos[m]=[]; grupos[m].push(p); });
    var marcas=Object.keys(grupos).sort(function(a,b){
      var oa=getOrdenMarca(a,grupos[a]), ob=getOrdenMarca(b,grupos[b]);
      if(oa!==ob) return oa-ob; return a.localeCompare(b,'es');
    });
    marcas.forEach(function(marca){
      grupos[marca].sort(function(a,b){return a.nombre.localeCompare(b.nombre,'es');});
      indiceMarcas.push(marca);
      html+='<div class="marca-h" id="'+slug(marca)+'"><span class="mn">'+marca.toUpperCase()+'</span><span class="mc">'+grupos[marca].length+' ítems</span></div>';
      html+='<div class="lista">';
      grupos[marca].forEach(function(p){
        var ag=p.stock===0, of=!!p.oferta&&!ag, cm=!!p.marco&&!ag;
        var id=cartId(p), inc=CART[id];
        var cls='fila'+(ag?' ag':'')+(of?' of':'')+(cm?' cm':'')+(inc?' incart':'');
        var tags=''; if(of) tags+='<span class="tag tag-of">OFERTA</span>'; if(cm) tags+='<span class="tag tag-cm">C/M</span>';
        var qty=inc?'<span class="qty">'+inc.cant+'</span>':'';
        var precio=ag?'<span class="sinstock">SIN STOCK</span>':'<span class="precio">'+fmt(p.precio)+'</span>';
        html+='<div class="'+cls+'"'+(ag?'':' data-pid="'+id+'"')+'><div class="nom">'+(p.nombre||'')+tags+qty+'</div>'+precio+'</div>';
      });
      html+='</div>';
    });
  });
  // índice de marcas
  var idx=document.getElementById('marca-idx');
  if(indiceMarcas.length>1){
    idx.style.display='flex';
    idx.innerHTML=indiceMarcas.map(function(m){return '<button onclick="saltarMarca(\''+slug(m)+'\')">'+m.toUpperCase()+'</button>';}).join('');
  } else { idx.style.display='none'; idx.innerHTML=''; }
  if(!hayAlgo) html='<div class="empty">'+(f?'No se encontraron productos con "'+filtro+'"':'No hay productos en esta categoría')+'</div>';
  cont.innerHTML=html;
}
window.saltarMarca=function(id){
  var el=document.getElementById(id);
  if(el){ var y=el.getBoundingClientRect().top+window.scrollY-200; window.scrollTo({top:y,behavior:'smooth'}); }
};
document.getElementById('search').addEventListener('input',function(e){ filtro=e.target.value; render(); });
document.getElementById('content').addEventListener('click',function(e){
  var row=e.target.closest('.fila[data-pid]');
  if(row && row.dataset.pid) addToCart(row.dataset.pid);
});
window.setCategoria=function(cat,btn){
  categoriaActiva=cat;
  document.querySelectorAll('.chip').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
  render();
};
onSnapshot(doc(db,'arstecnologia','datos'),function(snap){
  document.getElementById('loading').style.display='none';
  if(snap.exists()){ var d=snap.data(); PRODUCTOS=(d.productos||[]).filter(function(p){return cats.indexOf(p.categoria)>=0;}); }
  else PRODUCTOS=[];
  render();
},function(err){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').innerHTML='<div class="empty">Error: '+err.message+'</div>';
});
</script>
</body>
</html>
