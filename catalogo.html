<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catálogo · ARS Tecnología</title>
<meta property="og:title" content="Catálogo en vivo - ARS Tecnología">
<meta property="og:description" content="Lista de precios actualizada en tiempo real. Módulos, baterías y placas de carga. Martín Gainza 843, Alejandro Korn · 11 2186-1878">
<meta property="og:image" content="https://arstecnologia-ar.github.io/arstecnologia/logo.png">
<meta property="og:url" content="https://arstecnologia-ar.github.io/arstecnologia/catalogo.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Catálogo en vivo - ARS Tecnología">
<meta name="twitter:image" content="https://arstecnologia-ar.github.io/arstecnologia/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --azul:#0a3d62; --azul2:#13577f; --celeste:#2a7fb8; --cel-bg:#e8f3fb;
    --acento:#ffc93c; --txt:#0c2733; --linea:#dceaf4;
  }
  body{background:var(--cel-bg);font-family:Sora,system-ui,sans-serif;color:var(--txt);padding-bottom:84px}
  .loading{position:fixed;inset:0;background:linear-gradient(160deg,var(--azul),var(--azul2));display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999}
  .spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:var(--acento);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .wrap{max-width:880px;margin:0 auto;min-height:100vh}

  /* Hero premium */
  .hero{background:linear-gradient(160deg,var(--azul) 0%,var(--azul2) 100%);padding:26px 22px 22px;text-align:center;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 0%,rgba(255,201,60,.14),transparent 55%);pointer-events:none}
  .hero img{height:74px;width:auto;background:#fff;border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .hero h1{margin-top:14px;font-size:21px;font-weight:800;color:#fff;letter-spacing:.4px}
  .hero .tag{margin-top:4px;font-size:10px;color:#a7d2ef;letter-spacing:4px;font-weight:600}
  .hero .contact{display:flex;gap:9px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .hero .contact a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:11px}
  .c-wsp{background:#1d9e75;color:#fff}
  .c-loc{background:rgba(255,255,255,.12);color:#dcebff;color:#e8f3fb;border:1px solid rgba(255,255,255,.2)}

  /* Buscador + chips */
  .tools{position:sticky;top:0;z-index:60;background:var(--cel-bg);padding:13px 16px 10px;box-shadow:0 4px 16px rgba(10,61,98,.06)}
  .search{width:100%;background:#fff;border:1.5px solid var(--linea);border-radius:13px;padding:13px 16px;font-family:Sora;font-size:15px;color:var(--txt);outline:none}
  .search:focus{border-color:var(--celeste)}
  .chips{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:2px}
  .chip{flex-shrink:0;background:#fff;border:1.5px solid var(--linea);border-radius:999px;padding:8px 16px;font-size:12.5px;font-weight:600;color:#3a5d72;cursor:pointer;transition:.12s;white-space:nowrap}
  .chip.on{background:var(--azul);border-color:var(--azul);color:#fff}
  .live{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:10px;font-weight:600;color:#6b91a8;letter-spacing:1px}
  .dot{width:7px;height:7px;border-radius:50%;background:#2ecc71;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .content{padding:6px 16px 0}

  /* Sección de categoría */
  .cat-sec{margin-top:22px}
  .cat-title{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .cat-title .bar{width:4px;height:18px;border-radius:3px}
  .cat-title h2{font-size:14px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--azul)}

  /* Marca */
  .marca-block{margin-top:16px;border-left:4px solid var(--mcolor,#0a3d62);padding-left:11px;border-radius:3px}
  .marca-head{display:flex;align-items:center;gap:9px;padding:6px 8px;margin-bottom:9px;border-radius:9px;background:var(--mtint,#f0f6fb)}
  .marca-chip{font-family:Roboto Mono,monospace;font-size:12px;font-weight:700;letter-spacing:2px;color:#fff;padding:5px 12px;border-radius:8px}
  .marca-count{font-size:10.5px;color:#5a7689;font-weight:600}

  /* Grid de tarjetas */
  .grid{display:grid;grid-template-columns:1fr;gap:9px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:#fff;border:1.5px solid var(--linea);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:.13s;position:relative}
  .card:active{transform:scale(.985);border-color:var(--celeste)}
  .card .info{flex:1;min-width:0}
  .card .nom{font-family:Roboto Mono,monospace;font-size:13px;font-weight:500;line-height:1.32;word-break:break-word}
  .card .precio{font-family:Sora;font-size:17px;font-weight:800;color:var(--azul);margin-top:5px;letter-spacing:.2px}
  .card .add{flex-shrink:0;width:38px;height:38px;border-radius:11px;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300;line-height:1}
  .card.of{border-color:var(--acento);background:#fffdf2}
  .card.of .add{background:var(--acento);color:#3a2e00}
  .card.cm{background:#fff5e9}
  .card.ag{opacity:.5}
  .card.ag .add{display:none}
  .card.ag{cursor:default}
  .card.incart{border-color:#1d9e75;background:#edfaf3}
  .card.incart .add{background:#1d9e75}
  .badges{position:absolute;top:-7px;left:12px;display:flex;gap:5px}
  .b{font-size:8px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.5px}
  .b-of{background:var(--acento);color:#3a2e00}
  .b-cm{background:#9a4d00;color:#fff}
  .b-cart{background:#1d9e75;color:#fff}
  .sinstock{font-family:Sora;font-size:13px;font-weight:700;color:#c0392b;margin-top:5px}

  .empty{text-align:center;padding:60px 20px;color:#5a7689;font-size:14px}
  .foot{text-align:center;padding:24px;color:#6b91a8;font-size:11px}

  /* Carrito (igual base) */
  .cart-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:880px;background:#1d9e75;color:#fff;display:none;align-items:center;justify-content:space-between;padding:15px 22px;font-family:Sora;font-weight:600;cursor:pointer;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.25)}
  .cart-bar .cc{display:flex;align-items:center;gap:10px}
  .cart-bar .badge{background:#fff;color:#1d9e75;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .cart-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:880px;background:#fff;z-index:210;border-radius:20px 20px 0 0;transition:transform .25s;max-height:78vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.3)}
  .cart-panel.open{transform:translateX(-50%) translateY(0)}
  .cart-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px 12px;border-bottom:1px solid #eef2f5}
  .cart-head b{font-size:16px;font-weight:700}
  .cart-vaciar{background:none;border:none;color:#c0392b;font-size:12px;font-weight:600;cursor:pointer}
  .cart-items{overflow-y:auto;padding:8px 18px}
  .cart-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #f3f3f3}
  .ci-name{flex:1;font-size:13px;font-weight:600;line-height:1.3}
  .ci-sub{font-size:11px;color:#888;font-weight:400;margin-top:2px}
  .ci-qty{display:flex;align-items:center;gap:9px}
  .ci-qty button{width:29px;height:29px;border:1px solid var(--linea);background:#f5fafe;border-radius:8px;font-size:17px;font-weight:700;color:var(--azul);cursor:pointer}
  .ci-qty span{min-width:18px;text-align:center;font-weight:700;font-size:14px}
  .ci-sub-total{font-family:Roboto Mono,monospace;font-weight:700;font-size:13px;min-width:72px;text-align:right}
  .ci-del{background:none;border:none;color:#bbb;font-size:14px;cursor:pointer;padding:4px}
  .cart-foot{padding:16px 22px;border-top:1px solid #eef2f5;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .cart-foot-total{font-size:14px}
  .cart-foot-total strong{font-size:20px;color:var(--azul)}
  .cart-wsp{display:inline-flex;align-items:center;gap:8px;background:#1d9e75;color:#fff;border:none;border-radius:12px;padding:14px 22px;font-family:Sora;font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="color:var(--acento);font-size:12px;letter-spacing:3px;font-weight:600">ARS TECNOLOGÍA</div>
</div>

<div class="wrap">
  <div class="hero">
    <img src="logo.png" alt="ARS Tecnología" onerror="this.style.display='none'">
    <h1>ARS Tecnología</h1>
    <div class="tag">LISTA DE PRECIOS EN VIVO</div>
    <div class="contact">
      <a class="c-wsp" href="https://wa.me/5491121861878" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2z"/></svg>
        11 2186-1878
      </a>
      <a class="c-loc" href="https://maps.google.com/?q=Mart%C3%ADn+Gainza+843+Alejandro+Korn" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#ff6b6b"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
        Martín Gainza 843
      </a>
    </div>
  </div>

  <div class="tools">
    <input type="text" class="search" id="search" placeholder="🔍 Buscar modelo, marca o repuesto…">
    <div class="chips" id="chips">
      <div class="chip on" data-cat="todos" onclick="setCategoria('todos',this)">Todos</div>
      <div class="chip" data-cat="Módulo" onclick="setCategoria('Módulo',this)">Módulos</div>
      <div class="chip" data-cat="Batería" onclick="setCategoria('Batería',this)">Baterías</div>
      <div class="chip" data-cat="Placa de Carga" onclick="setCategoria('Placa de Carga',this)">Placas de carga</div>
    </div>
    <div class="live"><span class="dot"></span>ACTUALIZADO EN TIEMPO REAL</div>
  </div>

  <div class="content" id="content"></div>
  <div class="foot">ARS Tecnología · Martín Gainza 843, Alejandro Korn · 11 2186-1878</div>
</div>

<div class="cart-panel" id="cart-panel">
  <div class="cart-head"><b>Tu pedido</b><button class="cart-vaciar" onclick="vaciarCarrito()">Vaciar</button></div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot">
    <div class="cart-foot-total">Total <strong id="panel-total">$ 0</strong></div>
    <button class="cart-wsp" onclick="enviarWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2z"/></svg>
      Enviar por WhatsApp
    </button>
  </div>
</div>
<div class="cart-bar" id="cart-bar" onclick="toggleCarrito()">
  <div class="cc"><span class="badge" id="cart-count">0</span><span>Ver pedido</span></div>
  <span id="cart-total">$ 0</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8YdOB_FVf6oSyFCWlzKepNSq46OEGU38",
  authDomain: "arstecnologia.firebaseapp.com",
  projectId: "arstecnologia",
  storageBucket: "arstecnologia.firebasestorage.app",
  messagingSenderId: "995023045742",
  appId: "1:995023045742:web:34dabb6d439e2f68add27f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var PRODUCTOS=[], filtro='', categoriaActiva='todos';
var cats=['Módulo','Batería','Placa de Carga'];
var nombres={'Módulo':'Módulos','Batería':'Baterías','Placa de Carga':'Placas de carga'};
var catColor={'Módulo':'#7cb342','Batería':'#e63946','Placa de Carga':'#1e6fff'};
var ORDEN_FIJO={'samsung':1,'motorola':2,'iphone':3,'apple':3,'xiaomi':4,'tcl':5,'lg':6};
var MARCA_COLOR={'samsung':'#1428a0','motorola':'#00875a','iphone':'#1d1d1f','apple':'#1d1d1f','xiaomi':'#ff6a00','tcl':'#e2231a','lg':'#a50034','huawei':'#c8102e','nokia':'#124191','realme':'#ffc915','oppo':'#1a7d3c','honor':'#0094d8'};
function getOrdenMarca(marca,productos){
  var m=marca.toLowerCase().trim();
  for(var key in ORDEN_FIJO){ if(m.indexOf(key)>=0) return ORDEN_FIJO[key]; }
  var ov=productos.map(function(p){return p.orden||0;}).filter(function(o){return o>0;});
  if(ov.length>0) return 100+Math.min.apply(null,ov);
  return 9999;
}
function colorMarca(marca){ var m=marca.toLowerCase().trim(); for(var k in MARCA_COLOR){ if(m.indexOf(k)>=0) return MARCA_COLOR[k]; } return '#0a3d62'; }
function tintMarca(hex){
  hex=hex.replace('#',''); if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.substr(0,2),16), g=parseInt(hex.substr(2,2),16), b=parseInt(hex.substr(4,2),16);
  return 'rgba('+r+','+g+','+b+',0.10)';
}
function fmt(n){ return '$ '+Number(n||0).toLocaleString('es-AR'); }

var CART={}, WSP_NUMERO='5491121861878';
function cartId(p){ return (p.categoria||'')+'|'+(p.modelo||'')+'|'+(p.nombre||''); }
function addToCart(id){
  var p=PRODUCTOS.find(function(x){return cartId(x)===id;});
  if(!p||p.stock===0) return;
  if(CART[id]) CART[id].cant++; else CART[id]={nombre:p.nombre,precio:p.precio,cant:1};
  renderCarrito(); render();
}
window.cambiarCant=function(id,d){ if(!CART[id])return; CART[id].cant+=d; if(CART[id].cant<=0)delete CART[id]; renderCarrito(); render(); };
window.quitarItem=function(id){ delete CART[id]; renderCarrito(); render(); };
window.vaciarCarrito=function(){ CART={}; renderCarrito(); render(); };
function totalCarrito(){ var t=0,n=0; for(var id in CART){ t+=CART[id].precio*CART[id].cant; n+=CART[id].cant; } return {total:t,unidades:n}; }
function renderCarrito(){
  var bar=document.getElementById('cart-bar'), panel=document.getElementById('cart-panel'), t=totalCarrito();
  if(t.unidades===0){ bar.style.display='none'; panel.classList.remove('open'); return; }
  bar.style.display='flex';
  document.getElementById('cart-count').textContent=t.unidades;
  document.getElementById('cart-total').textContent=fmt(t.total);
  var items='';
  for(var id in CART){ var it=CART[id]; var sid=id.replace(/'/g,"\\'");
    items+='<div class="cart-item"><div class="ci-name">'+it.nombre+'<div class="ci-sub">'+fmt(it.precio)+' c/u</div></div>'+
    '<div class="ci-qty"><button onclick="cambiarCant(\''+sid+'\',-1)">−</button><span>'+it.cant+'</span><button onclick="cambiarCant(\''+sid+'\',1)">+</button></div>'+
    '<div class="ci-sub-total">'+fmt(it.precio*it.cant)+'</div><button class="ci-del" onclick="quitarItem(\''+sid+'\')">✕</button></div>';
  }
  document.getElementById('cart-items').innerHTML=items;
  document.getElementById('panel-total').textContent=fmt(t.total);
}
window.toggleCarrito=function(){ document.getElementById('cart-panel').classList.toggle('open'); };
window.enviarWhatsApp=function(){
  var t=totalCarrito(); if(t.unidades===0) return;
  var msg='*PEDIDO - ARS Tecnología*\n\n';
  for(var id in CART){ var it=CART[id]; msg+='• '+it.cant+'x '+it.nombre+' — '+fmt(it.precio*it.cant)+'\n'; }
  msg+='\n*Total: '+fmt(t.total)+'* ('+t.unidades+' u.)\n\nHola! Quiero hacer este pedido.';
  window.open('https://wa.me/'+WSP_NUMERO+'?text='+encodeURIComponent(msg),'_blank');
};

function render(){
  var cont=document.getElementById('content'), f=filtro.toLowerCase().trim();
  var html='', hayAlgo=false;
  cats.forEach(function(cat){
    if(categoriaActiva!=='todos' && cat!==categoriaActiva) return;
    var prodsCat=PRODUCTOS.filter(function(p){
      if(p.categoria!==cat) return false;
      if(!f) return true;
      return (p.nombre||'').toLowerCase().indexOf(f)>=0 || (p.modelo||'').toLowerCase().indexOf(f)>=0;
    });
    if(prodsCat.length===0) return;
    hayAlgo=true;
    var grupos={};
    prodsCat.forEach(function(p){ var m=(p.modelo||'Sin marca').trim(); if(!grupos[m])grupos[m]=[]; grupos[m].push(p); });
    var marcas=Object.keys(grupos).sort(function(a,b){
      var oa=getOrdenMarca(a,grupos[a]), ob=getOrdenMarca(b,grupos[b]);
      if(oa!==ob) return oa-ob; return a.localeCompare(b,'es');
    });
    html+='<div class="cat-sec"><div class="cat-title"><div class="bar" style="background:'+catColor[cat]+'"></div><h2>'+nombres[cat]+'</h2></div>';
    marcas.forEach(function(marca){
      grupos[marca].sort(function(a,b){return a.nombre.localeCompare(b.nombre,'es');});
      var mcol=colorMarca(marca);
      html+='<div class="marca-block" style="--mcolor:'+mcol+';--mtint:'+tintMarca(mcol)+'"><div class="marca-head"><span class="marca-chip" style="background:'+mcol+'">'+marca.toUpperCase()+'</span><span class="marca-count">'+grupos[marca].length+' ítems</span></div><div class="grid">';
      grupos[marca].forEach(function(p){
        var ag=p.stock===0, of=!!p.oferta&&!ag, cm=!!p.marco&&!ag;
        var id=cartId(p), inc=CART[id];
        var cls='card'+(ag?' ag':'')+(of?' of':'')+(cm?' cm':'')+(inc?' incart':'');
        var badges='';
        if(of||cm||inc){ badges='<div class="badges">';
          if(of) badges+='<span class="b b-of">OFERTA</span>';
          if(cm) badges+='<span class="b b-cm">C/MARCO</span>';
          if(inc) badges+='<span class="b b-cart">'+inc.cant+' EN PEDIDO</span>';
          badges+='</div>'; }
        var precio=ag?'<div class="sinstock">SIN STOCK</div>':'<div class="precio">'+fmt(p.precio)+'</div>';
        var addBtn=ag?'':'<div class="add">+</div>';
        html+='<div class="'+cls+'"'+(ag?'':' data-pid="'+id+'"')+'>'+badges+'<div class="info"><div class="nom">'+(p.nombre||'')+'</div>'+precio+'</div>'+addBtn+'</div>';
      });
      html+='</div></div>';
    });
    html+='</div>';
  });
  if(!hayAlgo) html='<div class="empty">'+(f?'No se encontraron productos con "'+filtro+'"':'No hay productos en esta categoría')+'</div>';
  cont.innerHTML=html;
}
document.getElementById('search').addEventListener('input',function(e){ filtro=e.target.value; render(); });
document.getElementById('content').addEventListener('click',function(e){
  var card=e.target.closest('.card[data-pid]');
  if(card && card.dataset.pid) addToCart(card.dataset.pid);
});
window.setCategoria=function(cat,btn){
  categoriaActiva=cat;
  document.querySelectorAll('.chip').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
  render();
};
onSnapshot(doc(db,'arstecnologia','datos'),function(snap){
  document.getElementById('loading').style.display='none';
  if(snap.exists()){ var d=snap.data(); PRODUCTOS=(d.productos||[]).filter(function(p){return cats.indexOf(p.categoria)>=0;}); }
  else PRODUCTOS=[];
  render();
},function(err){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').innerHTML='<div class="empty">Error: '+err.message+'</div>';
});
</script>
</body>
</html>
