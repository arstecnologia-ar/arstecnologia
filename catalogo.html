<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#d6ecff;font-family:Georgia,serif;color:#000;padding-bottom:80px}
  .loading{position:fixed;inset:0;background:#0a3d62;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999}

  .live-badge{display:inline-flex;align-items:center;gap:6px;background:#1a5e1a;color:#7fff7f;font-family:Arial,sans-serif;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;margin-top:8px}

  .header{background:#0a3d62;padding:28px 20px 16px;text-align:center}
  .header img{max-width:300px;width:75%;height:auto;background:#fff;border-radius:16px;padding:18px}
  .header .sub{margin-top:14px;font-family:Georgia,serif;font-size:11px;color:#cfe8ff;letter-spacing:5px;font-style:italic}
  .contact{background:#0a3d62;padding:14px 20px 18px;text-align:center;border-bottom:4px solid #ffe600}
  .contact-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .contact-btn{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-family:Arial,sans-serif;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;transition:.15s}

  .cat-btn:hover{border-color:#666}
  .cat-btn.active-mod{background:#7cb342;border-color:#7cb342;color:#000}

  /* CARRITO */
  .qty-pill{display:inline-block;background:#1d9e75;color:#fff;font-family:Arial,sans-serif;font-size:10px;font-weight:700;min-width:18px;text-align:center;padding:1px 5px;border-radius:10px;margin-left:6px;vertical-align:middle}
  .cart-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:780px;background:#1d9e75;color:#fff;display:none;align-items:center;justify-content:space-between;padding:14px 20px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
  .cart-bar-left{display:flex;align-items:center;gap:10px;font-size:14px}
  .cart-icon{position:relative;font-size:20px}
  .cart-count{position:absolute;top:-6px;right:-10px;background:#e63946;color:#fff;font-size:10px;min-width:17px;height:17px;line-height:17px;text-align:center;border-radius:9px;padding:0 4px}
  .cart-bar-total{font-size:16px}
  .cart-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:780px;background:#fff;z-index:210;border-radius:16px 16px 0 0;transition:transform .25s ease;max-height:75vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.4)}
  .cart-panel.open{transform:translateX(-50%) translateY(0)}
  .cart-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #eee;font-family:Arial,sans-serif;font-weight:700;font-size:16px;color:#1a1a1a}
  .cart-vaciar{background:none;border:none;color:#c00;font-family:Arial,sans-serif;font-size:12px;font-weight:700;cursor:pointer}
  .cart-items{overflow-y:auto;padding:6px 0;flex:1}
  .cart-item{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid #f2f2f2}
  .ci-name{flex:1;font-family:Roboto Mono,monospace;font-size:12px;color:#1a1a1a;line-height:1.3}
  .ci-sub{font-family:Arial,sans-serif;font-size:10px;color:#999;margin-top:2px}
  .ci-qty{display:flex;align-items:center;gap:8px}
  .ci-qty button{width:28px;height:28px;border:1px solid #ccc;background:#f7f7f7;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;color:#1a1a1a;line-height:1}
  .ci-qty span{font-family:Arial,sans-serif;font-weight:700;font-size:14px;min-width:18px;text-align:center}
  .ci-sub-total{font-family:Roboto Mono,monospace;font-size:11px;font-weight:700;color:#1a1a1a;min-width:70px;text-align:right}
  .ci-del{background:none;border:none;color:#bbb;font-size:14px;cursor:pointer;padding:4px}
  .cart-foot{padding:14px 18px;border-top:1px solid #eee;display:flex;align-items:center;gap:12px}
  .cart-foot-total{flex:1;font-family:Arial,sans-serif;font-size:13px;color:#666}

  .cart-wsp{display:inline-flex;align-items:center;gap:8px;background:#1d9e75;color:#fff;border:none;border-radius:10px;padding:13px 18px;font-family:Arial,sans-serif;font-size:14px;font-weight:700;cursor:pointer}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8YdOB_FVf6oSyFCWlzKepNSq46OEGU38",
  authDomain: "arstecnologia.firebaseapp.com",
  projectId: "arstecnologia",
  storageBucket: "arstecnologia.firebasestorage.app",
  messagingSenderId: "995023045742",
  appId: "1:995023045742:web:34dabb6d439e2f68add27f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var PRODUCTOS = [];
var filtro = '';
var categoriaActiva = 'todos';

var cats=['Módulo','Batería','Placa de Carga'];
var nombres={'Módulo':'MODULOS','Batería':'BATERIAS','Placa de Carga':'PLACAS DE CARGA'};
var catColor={'Módulo':'#7cb342','Batería':'#e63946','Placa de Carga':'#1e6fff'};
var headerTextColor={'Módulo':'#000','Batería':'#000','Placa de Carga':'#fff'};
var ORDEN_FIJO={'samsung':1,'motorola':2,'iphone':3,'apple':3,'xiaomi':4,'tcl':5,'lg':6};

function getOrdenMarca(marca, productos){
  var m=marca.toLowerCase().trim();
  for(var key in ORDEN_FIJO){ if(m.indexOf(key)>=0) return ORDEN_FIJO[key]; }
  var ordenesValidos=productos.map(function(p){return p.orden||0;}).filter(function(o){return o>0;});
  if(ordenesValidos.length>0) return 100+Math.min.apply(null,ordenesValidos);
  return 9999;
}
function espaciar(txt){ return txt.toUpperCase().split('').join(' '); }
function fmt(n){ return '$ '+Number(n||0).toLocaleString('es-AR'); }

var ACENTOS_MARCA={
  'samsung':{linea:'#e63946',texto:'#f09595'},
  'motorola':{linea:'#ef9f27',texto:'#fac775'},
  'iphone':{linea:'#9aa0a6',texto:'#d4d7db'},
  'apple':{linea:'#9aa0a6',texto:'#d4d7db'},
  'xiaomi':{linea:'#ff6a00',texto:'#ffb27a'},
  'tcl':{linea:'#3d9be9',texto:'#9ecdf2'},
  'lg':{linea:'#c44dd6',texto:'#e0a8e9'}
};
function getAcentoMarca(marca){
  var m=marca.toLowerCase().trim();
  for(var key in ACENTOS_MARCA){ if(m.indexOf(key)>=0) return ACENTOS_MARCA[key]; }
  return {linea:'#ffe600',texto:'#ffe600'};
}

function filaProducto(p, esUltima, idx){
  var ag=p.stock===0;
  var oferta=!!p.oferta && !ag;
  var marco=!!p.marco && !ag;
  var precioStr=ag?'SIN STOCK':fmt(p.precio);
  var bb=esUltima?'':'border-bottom:1px solid #eee;';
  var nombre=p.nombre||'';
  var unaCol = window.innerWidth < 600;
  var fs, nameCell;
  if(unaCol){
    fs=14;
    if(nombre.length>34) fs=12.5;
    nameCell='padding:9px 10px;'+bb+'font-family:Roboto Mono,monospace;font-size:'+fs+'px;line-height:1.25;word-break:break-word';
   } else {
    // Desktop: tamaño único para todos, los largos bajan a 2 líneas
    fs=10;
    nameCell='padding:8px 10px;'+bb+'font-family:Roboto Mono,monospace;font-size:'+fs+'px;line-height:1.3;word-break:break-word';
  }
  var mid='';
  if(oferta){
    mid='<span style="display:inline-block;background:#000;color:#ffe600;font-family:Arial;font-size:7px;font-weight:900;padding:2px 5px;border-radius:2px">OFERTA</span>';
    if(marco) mid+='<br><span style="display:inline-block;background:#9a4d00;color:#fff;font-family:Arial;font-size:7px;font-weight:900;padding:2px 5px;border-radius:2px;margin-top:2px">C/M</span>';
  } else if(marco){
    mid='<span style="display:inline-block;background:#9a4d00;color:#fff;font-family:Arial;font-size:7px;font-weight:900;padding:2px 5px;border-radius:2px">C/M</span>';
  }
  var bg=(idx%2===1)?'#fafafa':'#fff';
  if(oferta) bg='#ffe600';
  else if(marco) bg='#ffd4a3';
  else if(!ag && p.color) bg=p.color;
  else if(ag) bg='#f7f2f2';
  var colorP=ag?'#c00':'#000';
  var colorN=ag?'#999':'#1a1a1a';
  var id=cartId(p);
  var enCarrito=CART[id];
  var cantBadge='';
  if(enCarrito){
    cantBadge='<span class="qty-pill">'+enCarrito.cant+'</span>';
    bg='#fff8d6';
  }
  var clickAttr = ag ? '' : ' class="row-add" data-pid="'+id+'" style="cursor:pointer;background:'+bg+'"';
  var rowStyle = ag ? ' style="background:'+bg+'"' : '';
  return '<tr'+(ag?rowStyle:clickAttr)+'>'+
    '<td style="'+nameCell+';color:'+colorN+';font-weight:'+(oferta?'600':'500')+'">'+(oferta?'(OF) ':'')+nombre+cantBadge+'</td>'+
    '<td style="padding:8px 4px;'+bb+'text-align:center;width:48px">'+mid+'</td>'+
    '<td style="padding:8px 10px;'+bb+'font-family:Roboto Mono,monospace;font-size:11px;color:'+colorP+';font-weight:700;text-align:right;white-space:nowrap;width:85px;font-variant-numeric:tabular-nums">'+precioStr+'</td>'+
  '</tr>';
}

function tablaProductos(prods){
  var unaColumna = window.innerWidth < 600;
  function col(ps){
    if(ps.length===0) return '<table style="width:100%;border-collapse:collapse;table-layout:fixed"></table>';
    return '<table style="width:100%;border-collapse:collapse;table-layout:fixed">'+
      '<colgroup><col style="width:auto"><col style="width:48px"><col style="width:85px"></colgroup>'+
      '<thead><tr style="background:#f0f0f0">'+
        '<th style="padding:6px 10px;font-family:Arial;font-size:8px;color:#888;text-align:left;letter-spacing:1px;border-bottom:1px solid #ddd">PRODUCTO</th>'+
        '<th style="border-bottom:1px solid #ddd"></th>'+
        '<th style="padding:6px 10px;font-family:Arial;font-size:8px;color:#888;text-align:right;letter-spacing:1px;border-bottom:1px solid #ddd">PRECIO</th>'+
      '</tr></thead><tbody>'+
      ps.map(function(p,i){return filaProducto(p,i===ps.length-1,i);}).join('')+
      '</tbody></table>';
  }
  if(unaColumna){
    return col(prods);
  }
  var mid=Math.ceil(prods.length/2);
  var c1=prods.slice(0,mid), c2=prods.slice(mid);
  return '<table style="width:100%;border-collapse:collapse"><tr>'+
    '<td style="vertical-align:top;width:50%;border-right:1px solid #000">'+col(c1)+'</td>'+
    '<td style="vertical-align:top;width:50%">'+col(c2)+'</td>'+
  '</tr></table>';
}

var CART={};
var WSP_NUMERO='5491121861878';

function cartId(p){ return (p.categoria||'')+'|'+(p.modelo||'')+'|'+(p.nombre||''); }

function addToCart(id){
  var prod=null;
  for(var i=0;i<PRODUCTOS.length;i++){ if(cartId(PRODUCTOS[i])===id){ prod=PRODUCTOS[i]; break; } }
  if(!prod || prod.stock===0) return;
  if(CART[id]) CART[id].cant++;
  else CART[id]={nombre:prod.nombre,precio:Number(prod.precio||0),modelo:prod.modelo||'',cant:1};
  renderCarrito();
  render();
}
window.cambiarCant=function(id,delta){
  if(!CART[id]) return;
  CART[id].cant+=delta;
  if(CART[id].cant<=0) delete CART[id];
  renderCarrito();
  render();
};
window.quitarItem=function(id){ delete CART[id]; renderCarrito(); render(); };
window.vaciarCarrito=function(){ CART={}; renderCarrito(); render(); };

function totalCarrito(){
  var t=0, n=0;
  for(var id in CART){ t+=CART[id].precio*CART[id].cant; n+=CART[id].cant; }
  return {total:t, unidades:n};
}

function renderCarrito(){
  var bar=document.getElementById('cart-bar');
  var panel=document.getElementById('cart-panel');
  var t=totalCarrito();
  if(t.unidades===0){
    bar.style.display='none';
    panel.classList.remove('open');
    return;
  }
  bar.style.display='flex';
  document.getElementById('cart-count').textContent=t.unidades;
  document.getElementById('cart-total').textContent=fmt(t.total);
  var items='';
  for(var id in CART){
    var it=CART[id];
    var safeId=id.replace(/'/g,"\\'");
    items+='<div class="cart-item">'+
      '<div class="ci-name">'+it.nombre+'<div class="ci-sub">'+fmt(it.precio)+' c/u</div></div>'+
      '<div class="ci-qty">'+
        '<button onclick="cambiarCant(\''+safeId+'\',-1)">−</button>'+
        '<span>'+it.cant+'</span>'+
        '<button onclick="cambiarCant(\''+safeId+'\',1)">+</button>'+
      '</div>'+
      '<div class="ci-sub-total">'+fmt(it.precio*it.cant)+'</div>'+
      '<button class="ci-del" onclick="quitarItem(\''+safeId+'\')">✕</button>'+
    '</div>';
  }
  document.getElementById('cart-items').innerHTML=items;
  document.getElementById('panel-total').textContent=fmt(t.total);
}

window.toggleCarrito=function(){
  document.getElementById('cart-panel').classList.toggle('open');
};

window.enviarWhatsApp=function(){
  var t=totalCarrito();
  if(t.unidades===0) return;
  var msg='*PEDIDO - ARS Tecnología*\n\n';
  for(var id in CART){
    var it=CART[id];
    msg+='• '+it.cant+'x '+it.nombre+' — '+fmt(it.precio*it.cant)+'\n';
  }
  msg+='\n*Total: '+fmt(t.total)+'* ('+t.unidades+' u.)\n\nHola! Quiero hacer este pedido.';
  var url='https://wa.me/'+WSP_NUMERO+'?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
};

function render(){
  var cont=document.getElementById('content');
  var f=filtro.toLowerCase().trim();
  var html='';
  var hayAlgo=false;

  cats.forEach(function(cat){
    if(categoriaActiva!=='todos' && cat!==categoriaActiva) return;
    var prodsCat=PRODUCTOS.filter(function(p){
      if(p.categoria!==cat) return false;
      if(!f) return true;
      return (p.nombre||'').toLowerCase().indexOf(f)>=0 || (p.modelo||'').toLowerCase().indexOf(f)>=0;
    });
    if(prodsCat.length===0) return;
    hayAlgo=true;

    var grupos={};
    prodsCat.forEach(function(p){ var m=(p.modelo||'Sin marca').trim(); if(!grupos[m])grupos[m]=[]; grupos[m].push(p); });
    var marcas=Object.keys(grupos).sort(function(a,b){
      var oa=getOrdenMarca(a,grupos[a]), ob=getOrdenMarca(b,grupos[b]);
      if(oa!==ob) return oa-ob;
      return a.localeCompare(b,'es');
    });
    marcas.forEach(function(m){ grupos[m].sort(function(a,b){return a.nombre.localeCompare(b.nombre,'es');}); });

    var color=catColor[cat], ht=headerTextColor[cat];
    html+='<div style="margin-top:18px;border:1px solid #1a1a1a;background:#fff;border-radius:8px;overflow:hidden">';
    html+='<div style="background:'+color+';padding:13px 18px;text-align:center"><div style="font-family:Georgia,serif;color:'+ht+';font-size:15px;font-weight:900;letter-spacing:4px">LISTA DE '+nombres[cat]+'</div></div>';
    marcas.forEach(function(marca,idx){
      var ac=getAcentoMarca(marca);
      html+='<div style="background:#0a3d62;padding:8px 16px;display:flex;align-items:center;border-left:4px solid '+ac.linea+(idx>0?';border-top:1px solid #13577f':'')+'"><span style="font-family:Roboto Mono,monospace;color:'+ac.texto+';font-size:13px;font-weight:700;letter-spacing:3px">'+espaciar(marca)+'</span></div>';
      html+='<div>'+tablaProductos(grupos[marca])+'</div>';
    });
    html+='</div>';
  });

  if(!hayAlgo){
    html='<div class="empty">'+(f?'No se encontraron productos con "'+filtro+'"':'No hay productos en esta categoría')+'</div>';
  }

  if(hayAlgo){
    html+='<div style="background:#0a3d62;padding:16px;text-align:center;border-top:4px solid #ffe600;margin-top:24px">'+
      '<div style="font-family:Georgia,serif;font-size:10px;color:#ffe600;letter-spacing:2px;font-style:italic">— Gracias por su preferencia —</div>'+
    '</div>';
  }

  cont.innerHTML=html;
}

document.getElementById('search').addEventListener('input', function(e){
  filtro=e.target.value;
  render();
});

document.getElementById('content').addEventListener('click', function(e){
  var row=e.target.closest('tr.row-add');
  if(row && row.dataset.pid){ addToCart(row.dataset.pid); }
});

window.setCategoria = function(cat, btn){
  categoriaActiva = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){
    b.classList.remove('active-todos','active-mod','active-bat','active-pla');
  });
  if(cat==='todos') btn.classList.add('active-todos');
  else if(cat==='Módulo') btn.classList.add('active-mod');
  else if(cat==='Batería') btn.classList.add('active-bat');
  else if(cat==='Placa de Carga') btn.classList.add('active-pla');
  render();
};

window.addEventListener('resize', render);

onSnapshot(doc(db,'arstecnologia','datos'), function(snap){
  document.getElementById('loading').style.display='none';
  if(snap.exists()){
    var data=snap.data();
    PRODUCTOS=(data.productos||[]).filter(function(p){
      return cats.indexOf(p.categoria)>=0;
    });
  } else {
    PRODUCTOS=[];
  }
  render();
}, function(err){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').innerHTML='<div class="empty">Error: '+err.message+'</div>';
});
</script>
</body>
</html>
